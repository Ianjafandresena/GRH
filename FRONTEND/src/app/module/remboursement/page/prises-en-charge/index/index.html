<div class="page-container">
    <div class="card-header-internal">
        <div class="title-group">
            <h1>Historique des Prises en Charge</h1>
        </div>
        <button class="btn btn-primary" (click)="goToCreate()">
            <i class="fas fa-plus"></i> Nouvelle PEC
        </button>
    </div>

    <div class="loading" *ngIf="loading">Chargement...</div>
    <div class="error" *ngIf="errorMsg">{{ errorMsg }}</div>

    <div class="mat-elevation-z8 table-container" *ngIf="!loading">
        <table mat-table [dataSource]="dataSource" matSort>

            <!-- PEC Num Column -->
            <ng-container matColumnDef="pec_num">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> N° PEC </th>
                <td mat-cell *matCellDef="let p">
                    <span class="ref-code">{{ p.pec_num }}</span>
                </td>
            </ng-container>

            <!-- Employee Column -->
            <ng-container matColumnDef="employee">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Employé </th>
                <td mat-cell *matCellDef="let p">
                    <div class="employee-cell">
                        <span class="emp-name">{{ p.nom_emp }} {{ p.prenom_emp }}</span>
                    </div>
                </td>
            </ng-container>

            <!-- Centre Column -->
            <ng-container matColumnDef="centre">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Centre </th>
                <td mat-cell *matCellDef="let p"> {{ p.cen_nom }} </td>
            </ng-container>

            <!-- Status Column -->
            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Statut </th>
                <td mat-cell *matCellDef="let p">
                    <span class="status-badge" [class.attente]="!p.pec_statut">
                        {{ p.pec_statut || 'En attente' }}
                    </span>
                </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef class="text-end"> Actions </th>
                <td mat-cell *matCellDef="let p" class="text-end actions">
                    <button class="btn btn-sm btn-outline" (click)="goToDetail(p.pec_code)" title="Voir détails">
                        <i class="fas fa-eye"></i>
                    </button>
                    <button class="btn btn-sm btn-primary" (click)="downloadBulletin(p.pec_code)" title="Télécharger">
                        <i class="fas fa-file-pdf"></i>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell empty" colspan="5">Aucune prise en charge trouvee</td>
            </tr>
        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 25, 50, 100]" aria-label="Choisir la page"></mat-paginator>
    </div>
</div>
