<div class="login-wrapper">
  <!-- Left Side: Branding -->
  <div class="brand-section">
    <div class="brand-content">
      <div class="logo-circle">
        <img src="assets/logo.png" alt="Logo">
      </div>
      <h2 class="welcome-text">BIENVENUE SUR L'ESPACE DE GESTION RH</h2>
    </div>

    <div class="waves-container">
      <svg class="waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 24 150 28" preserveAspectRatio="none"
        shape-rendering="auto">
        <defs>
          <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
        </defs>
        <g class="parallax">
          <use href="#gentle-wave" x="48" y="0" fill="rgba(255,255,255,0.3)" />
          <use href="#gentle-wave" x="48" y="3" fill="rgba(255,255,255,0.5)" />
          <use href="#gentle-wave" x="48" y="5" fill="rgba(255,255,255,0.2)" />
          <use href="#gentle-wave" x="48" y="7" fill="#fff" />
        </g>
      </svg>
    </div>
  </div>

  <!-- Right Side: Form -->
  <div class="form-section">
    <div class="login-card">
      <div class="top-logo">
        <img src="assets/min.png" alt="Government Logo" class="min-logo">
      </div>

      <h1 class="login-title">Connexion</h1>

      <div *ngIf="errorMessage" class="error-alert">
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
        <div class="form-group">
          <label class="input-label">Identifiant</label>
          <div class="input-with-icon">
            <i class="fas fa-user-circle"></i>
            <input type="text" name="username" [(ngModel)]="credentials.username" [disabled]="isLoading"
              class="custom-input" placeholder="Entrez votre nom d'utilisateur" required>
          </div>
        </div>

        <div class="form-group">
          <label class="input-label">Mot de passe</label>
          <div class="input-with-icon">
            <i class="fas fa-lock"></i>
            <input [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="credentials.password" [disabled]="isLoading"
              class="custom-input" placeholder="Entrez votre mot de passe" required>
            <button type="button" class="btn-toggle-password" (click)="togglePasswordVisibility()">
              <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
            </button>
          </div>
        </div>

        <button type="submit" [disabled]="isLoading || loginForm.invalid" class="btn-submit">
          <span *ngIf="!isLoading">Se connecter</span>
          <div *ngIf="isLoading" class="spinner"></div>
        </button>
      </form>
    </div>
  </div>
</div>
